document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"63bd1b1d-1c02-4882-abed-a16d29d1a2aa\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"2cb65f63-1add-41b0-a606-f590821e9264\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ca5c77c5-93f4-456c-adcb-c4ffac2bdecf\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e4afc4eb-9940-4240-a0f1-b951369aa232\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c8a6e057-4c3f-4865-9cfc-605cb584e716\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Saira Semi Condensed';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"61ad897b-1408-4f77-9506-e6737a4186e8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* --- surfaces --- */\n  --bg:        #070b11;   /* device-deep background */\n  --screen:    #0a0f17;   /* the TFT field */\n  --panel:     #0e141e;   /* channel panel */\n  --panel-2:   #121a26;   /* raised stat cell */\n  --rule:      #1b2533;   /* hairline */\n  --rule-soft: #141c28;\n\n  /* --- ink --- */\n  --ink:       #e8eef6;   /* primary text */\n  --ink-dim:   #8696aa;   /* labels */\n  --ink-faint: #6b7a8e;   /* secondary label */\n  --ink-mute:  #4a586b;   /* axis / faint */\n\n  /* --- channel identity --- */\n  --ch1:       #2dd4cf;   /* CH1 — teal/cyan */\n  --ch1-deep:  #0c2f30;\n  --ch2:       #f5a524;   /* CH2 — amber */\n  --ch2-deep:  #33240a;\n\n  /* --- semantic state colors (shared by both channels) --- */\n  --st-idle:   #64748b;   /* slate */\n  --st-sweep:  #5aa9ff;   /* blue — coarse/fine sweep */\n  --st-acq:    #fbbf24;   /* amber — peak found / acquiring */\n  --st-lock:   #34e0a1;   /* green — locked */\n  --st-hold:   #a78bfa;   /* violet — hold */\n  --st-fault:  #ff5a6a;   /* red — lost / fault */\n\n  /* --- plot --- */\n  --grid:      #16202e;\n  --trace-tx:  #2dd4cf;   /* transmission (overridden per channel) */\n  --trace-err: #f5a524;   /* error signal */\n\n  --shadow: 0 18px 50px -12px rgba(0,0,0,.8);\n}\n\n/* type roles */\n:root {\n  --f-ui:  'Saira Semi Condensed', system-ui, sans-serif;\n  --f-num: 'IBM Plex Mono', ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; }\n<\u002Fstyle>\n<style>/* ============================================================\n   Dual-PDH Controller — Screen component (the 320x240 TFT view)\n   Used by BOTH the interactive prototype and the screen board.\n   ============================================================ */\n\n.pdh {\n  width: 320px;\n  height: 240px;\n  background: var(--screen);\n  color: var(--ink);\n  font-family: var(--f-ui);\n  position: relative;\n  overflow: hidden;\n  display: flex;\n  flex-direction: column;\n  -webkit-font-smoothing: antialiased;\n  letter-spacing: .2px;\n}\n\n/* ---------------- top status bar ---------------- */\n.pdh-top {\n  height: 22px;\n  flex: 0 0 22px;\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 0 7px;\n  background: linear-gradient(#0c121b, #090e15);\n  border-bottom: 1px solid var(--rule);\n}\n.pdh-mark {\n  font-weight: 700;\n  font-size: 11px;\n  letter-spacing: 1.4px;\n  color: var(--ink);\n}\n.pdh-mark b { color: var(--ch1); }\n.pdh-mark i { color: var(--ch2); font-style: normal; }\n.pdh-top .sp { flex: 1; }\n.pdh-chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  font-size: 9.5px;\n  letter-spacing: .4px;\n  color: var(--ink-dim);\n  font-family: var(--f-num);\n}\n.pdh-chip .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--st-lock);\n  box-shadow: 0 0 6px var(--st-lock);\n}\n.pdh-chip .dot.warn { background: var(--st-acq); box-shadow: 0 0 6px var(--st-acq); }\n.pdh-chip .dot.bad  { background: var(--st-fault); box-shadow: 0 0 6px var(--st-fault); }\n.pdh-run {\n  font-family: var(--f-ui);\n  font-weight: 700;\n  font-size: 9.5px;\n  letter-spacing: 1px;\n  padding: 2px 6px;\n  border-radius: 3px;\n  color: var(--st-lock);\n  background: color-mix(in srgb, var(--st-lock) 16%, transparent);\n  border: 1px solid color-mix(in srgb, var(--st-lock) 45%, transparent);\n}\n.pdh-run.stop {\n  color: var(--ink-dim);\n  background: #0c1119;\n  border-color: var(--rule);\n}\n\n/* ---------------- channel panel ---------------- */\n.pdh-chan {\n  flex: 1 1 0;\n  display: grid;\n  grid-template-columns: 4px 1fr;\n  min-height: 0;\n  position: relative;\n  background: var(--panel);\n}\n.pdh-chan + .pdh-chan { border-top: 1px solid var(--rule); }\n.pdh-rail { background: var(--accent); box-shadow: 0 0 14px -2px var(--accent); }\n\n.pdh-chan-in {\n  display: flex;\n  flex-direction: column;\n  min-width: 0;\n  padding: 4px 7px 5px 8px;\n}\n\n/* channel header */\n.pdh-chead {\n  display: flex;\n  align-items: center;\n  gap: 7px;\n  height: 16px;\n  flex: 0 0 16px;\n}\n.pdh-cid {\n  font-weight: 700;\n  font-size: 12px;\n  letter-spacing: .6px;\n  color: var(--accent);\n}\n.pdh-cname {\n  font-size: 9.5px;\n  letter-spacing: .3px;\n  color: var(--ink-faint);\n  font-family: var(--f-num);\n  white-space: nowrap;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n.pdh-chead .sp { flex: 1; }\n\n/* state badge */\n.pdh-badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 4px;\n  font-weight: 600;\n  font-size: 9.5px;\n  letter-spacing: .7px;\n  padding: 2px 7px 2px 6px;\n  border-radius: 999px;\n  color: var(--sc);\n  background: color-mix(in srgb, var(--sc) 14%, transparent);\n  border: 1px solid color-mix(in srgb, var(--sc) 42%, transparent);\n  white-space: nowrap;\n}\n.pdh-badge .bdot {\n  width: 5px; height: 5px; border-radius: 50%;\n  background: var(--sc);\n  box-shadow: 0 0 6px var(--sc);\n}\n.pdh-badge.pulse .bdot { animation: bpulse 1s steps(2, jump-none) infinite; }\n@keyframes bpulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }\n\n/* channel body: plot | readouts (plot fills full height; id+badge overlay it) */\n.pdh-body {\n  flex: 1 1 0;\n  display: grid;\n  grid-template-columns: 1fr 150px;\n  gap: 7px;\n  min-height: 0;\n  margin-top: 0;\n}\n\n/* ---------------- plot ---------------- */\n.pdh-plot {\n  position: relative;\n  background:\n    linear-gradient(#0a1019, #080d14);\n  border: 1px solid var(--rule);\n  border-radius: 3px;\n  overflow: hidden;\n  min-width: 0;\n}\n.pdh-plot svg { display: block; width: 100%; height: 100%; }\n\n/* plot vector styling — strokes stay crisp under non-uniform scale */\n.pdh-plot svg .gln    { stroke: var(--grid); stroke-width: 1; vector-effect: non-scaling-stroke; }\n.pdh-plot svg .tflat  { stroke: var(--ink-mute); stroke-width: 1; stroke-dasharray: 2 3; vector-effect: non-scaling-stroke; opacity: .6; }\n.pdh-plot svg .tarea  { fill: color-mix(in srgb, var(--accent) 18%, transparent); stroke: none; }\n.pdh-plot svg .tline  { fill: none; stroke: var(--accent); stroke-width: 1.6; vector-effect: non-scaling-stroke; filter: drop-shadow(0 0 3px color-mix(in srgb, var(--accent) 60%, transparent)); }\n.pdh-plot svg .eline  { fill: none; stroke: var(--ch2); stroke-width: 1.3; vector-effect: non-scaling-stroke; opacity: .92; }\n.pdh-plot svg .ezero  { stroke: var(--ink-mute); stroke-width: 1; stroke-dasharray: 1 4; vector-effect: non-scaling-stroke; opacity: .7; }\n.pdh-plot svg .setln  { stroke: var(--st-lock); stroke-width: 1; stroke-dasharray: 3 2; vector-effect: non-scaling-stroke; opacity: .8; }\n.pdh-plot svg .setpt  { fill: var(--st-lock); stroke: #06210f; stroke-width: 1; filter: drop-shadow(0 0 4px var(--st-lock)); }\n.pdh-plot svg .scanln { stroke: var(--sc); stroke-width: 1.4; vector-effect: non-scaling-stroke; filter: drop-shadow(0 0 4px var(--sc)); }\n.pdh-plot svg .etime  { fill: none; stroke-width: 1.3; vector-effect: non-scaling-stroke; filter: drop-shadow(0 0 3px currentColor); }\n.pdh-plot svg .erail  { fill: none; stroke: var(--st-fault); stroke-width: 1.4; vector-effect: non-scaling-stroke; filter: drop-shadow(0 0 3px var(--st-fault)); }\n.pdh-plot .plab {\n  position: absolute;\n  left: 6px; bottom: 3px;\n  font-size: 8px;\n  letter-spacing: .8px;\n  color: var(--ink-mute);\n  font-family: var(--f-num);\n  text-transform: uppercase;\n  z-index: 2;\n  text-shadow: 0 1px 3px #000, 0 0 6px #000;\n}\n.pdh-plot .pval {\n  position: absolute;\n  right: 6px; bottom: 3px;\n  font-size: 8.5px;\n  letter-spacing: .3px;\n  color: var(--accent);\n  font-family: var(--f-num);\n  z-index: 2;\n  text-shadow: 0 1px 3px #000, 0 0 6px #000;\n}\n/* channel id + state badge overlaid on the plot */\n.pdh-plot .pov-id {\n  position: absolute;\n  left: 6px; top: 4px;\n  font-weight: 700;\n  font-size: 13px;\n  letter-spacing: .5px;\n  color: var(--accent);\n  z-index: 3;\n  text-shadow: 0 1px 4px #000, 0 0 8px rgba(0,0,0,.9);\n}\n.pdh-plot .pov-badge {\n  position: absolute;\n  right: 5px; top: 4px;\n  z-index: 3;\n  backdrop-filter: blur(1px);\n}\n\n/* ---------------- readouts ---------------- */\n.pdh-reads {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  grid-auto-rows: 1fr;\n  gap: 4px;\n  min-width: 0;\n}\n.pdh-stat {\n  background: var(--panel-2);\n  border: 1px solid var(--rule-soft);\n  border-radius: 3px;\n  padding: 2px 5px 3px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  min-width: 0;\n}\n.pdh-stat .k {\n  font-size: 7.5px;\n  letter-spacing: .7px;\n  color: var(--ink-mute);\n  text-transform: uppercase;\n  line-height: 1.1;\n}\n.pdh-stat .v {\n  font-family: var(--f-num);\n  font-weight: 500;\n  font-size: 13px;\n  line-height: 1.05;\n  color: var(--ink);\n  white-space: nowrap;\n}\n.pdh-stat .v small {\n  font-size: 8px;\n  color: var(--ink-faint);\n  font-weight: 400;\n  margin-left: 1px;\n}\n.pdh-stat.accent .v { color: var(--accent); }\n.pdh-stat.span2 { grid-column: span 2; }\n\n/* lock health bar (spans both readout columns) */\n.pdh-health {\n  grid-column: span 2;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  background: var(--panel-2);\n  border: 1px solid var(--rule-soft);\n  border-radius: 3px;\n  padding: 0 6px;\n}\n.pdh-health .hlab {\n  font-size: 7.5px;\n  letter-spacing: .6px;\n  color: var(--ink-mute);\n  text-transform: uppercase;\n}\n.pdh-health .bar {\n  flex: 1;\n  height: 5px;\n  border-radius: 3px;\n  background: #0a1019;\n  overflow: hidden;\n  position: relative;\n}\n.pdh-health .bar > i {\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  background: var(--sc);\n  border-radius: 3px;\n}\n.pdh-health .hval {\n  font-family: var(--f-num);\n  font-size: 9px;\n  color: var(--sc);\n}\n\n/* ---------------- settings / calibration screen ---------------- */\n.pdh-set { flex: 1 1 0; display: flex; flex-direction: column; padding: 6px 9px; min-height: 0; }\n.pdh-set-h {\n  font-size: 10px; letter-spacing: 1px; color: var(--ink-dim);\n  text-transform: uppercase; font-weight: 600; margin-bottom: 5px;\n  display: flex; align-items: center; gap: 6px;\n}\n.pdh-set-h::after { content:''; flex:1; height:1px; background: var(--rule); }\n.pdh-rows { display: flex; flex-direction: column; gap: 0; }\n.pdh-row {\n  display: grid; grid-template-columns: 12px 1fr auto;\n  align-items: center; gap: 8px;\n  height: 21px;\n  border-bottom: 1px solid var(--rule-soft);\n  font-size: 11px;\n}\n.pdh-row .ico { color: var(--ink-mute); font-family: var(--f-num); font-size: 10px; text-align:center; }\n.pdh-row .lab { color: var(--ink); letter-spacing: .2px; }\n.pdh-row .val { font-family: var(--f-num); font-size: 11px; color: var(--ink-dim); }\n.pdh-row.sel { background: color-mix(in srgb, var(--ch1) 12%, transparent); border-radius: 3px; }\n.pdh-row.sel .ico { color: var(--ch1); }\n.pdh-row.sel .val { color: var(--ch1); }\n.pdh-set-foot {\n  margin-top: auto; padding-top: 5px;\n  display: flex; gap: 6px; align-items: center;\n  font-size: 8.5px; color: var(--ink-mute); font-family: var(--f-num); letter-spacing: .3px;\n}\n.pdh-key {\n  border: 1px solid var(--rule); border-radius: 3px;\n  padding: 1px 5px; color: var(--ink-dim);\n}\n\n/* scanline / glass nuance for realism (very subtle) */\n.pdh::after {\n  content: '';\n  position: absolute; inset: 0;\n  pointer-events: none;\n  background: radial-gradient(130% 100% at 50% 50%, transparent 72%, rgba(0,0,0,.28) 100%);\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; height: 100%; }\n  body {\n    background:\n      radial-gradient(120% 80% at 50% -10%, #10161f 0%, var(--bg) 60%);\n    color: var(--ink);\n    font-family: var(--f-ui);\n    min-height: 100%;\n    display: flex;\n    align-items: flex-start;\n    justify-content: center;\n    padding: 34px 28px 60px;\n  }\n  .wrap { display: flex; gap: 34px; align-items: flex-start; }\n\n  /* ---- intro column header ---- */\n  .lead { width: 640px; margin-bottom: 18px; }\n  .lead .kick {\n    font-family: var(--f-num); font-size: 11px; letter-spacing: 3px;\n    color: var(--ch1); text-transform: uppercase; margin: 0 0 6px;\n  }\n  .lead h1 { margin: 0; font-size: 27px; font-weight: 700; letter-spacing: .3px; }\n  .lead p { margin: 8px 0 0; color: var(--ink-dim); font-size: 13.5px; max-width: 560px; line-height: 1.5; }\n\n  /* ---- device module ---- */\n  .device {\n    position: relative;\n    background: linear-gradient(150deg, #12161d, #0b0e13);\n    border: 1px solid #1c2430;\n    border-radius: 16px;\n    padding: 18px 18px 14px;\n    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.03);\n  }\n  .device .hole {\n    position: absolute; width: 9px; height: 9px; border-radius: 50%;\n    background: #05070a; box-shadow: inset 0 0 0 1px #222c38, 0 1px 0 rgba(255,255,255,.04);\n  }\n  .device .hole.tl { top: 7px; left: 7px; } .device .hole.tr { top: 7px; right: 7px; }\n  .device .hole.bl { bottom: 7px; left: 7px; } .device .hole.br { bottom: 7px; right: 7px; }\n  .bezel {\n    background: #000; border-radius: 7px; padding: 9px;\n    box-shadow: inset 0 0 0 1px #20262f, inset 0 0 22px rgba(0,0,0,.9);\n  }\n  .screen-wrap { width: 640px; height: 480px; overflow: hidden; border-radius: 2px; }\n  #screen { width: 320px; height: 240px; transform: scale(2); transform-origin: top left; }\n  .device-foot {\n    display: flex; align-items: center; gap: 8px; margin-top: 11px; padding: 0 4px;\n    font-family: var(--f-num); font-size: 10.5px; color: var(--ink-mute); letter-spacing: .4px;\n  }\n  .device-foot .pwr { width: 7px; height: 7px; border-radius: 50%; background: var(--st-lock); box-shadow: 0 0 7px var(--st-lock); }\n  .device-foot .sp { flex: 1; }\n\n  /* ---- control console ---- */\n  .console {\n    width: 312px;\n    background: linear-gradient(#0e141d, #0b1017);\n    border: 1px solid var(--rule);\n    border-radius: 12px;\n    padding: 15px 15px 16px;\n    box-shadow: var(--shadow);\n  }\n  .console h2 {\n    margin: 0 0 2px; font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase;\n    color: var(--ink); font-weight: 700;\n  }\n  .console .sub { font-family: var(--f-num); font-size: 10px; color: var(--ink-mute); letter-spacing: .4px; margin-bottom: 13px; }\n\n  .cgroup { border-top: 1px solid var(--rule-soft); padding: 11px 0 4px; }\n  .cgroup:first-of-type { border-top: 0; padding-top: 0; }\n  .cglabel {\n    display: flex; align-items: center; gap: 7px;\n    font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-dim);\n    margin-bottom: 9px; font-weight: 600;\n  }\n  .cglabel .cdot { width: 8px; height: 8px; border-radius: 50%; }\n  .cglabel .stat { margin-left: auto; font-family: var(--f-num); font-size: 9.5px; letter-spacing: .5px; }\n\n  .brow { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }\n  .brow.one { grid-template-columns: 1fr; }\n  .btn {\n    appearance: none; border: 1px solid var(--rule); background: #121a25; color: var(--ink);\n    font-family: var(--f-ui); font-size: 12px; font-weight: 600; letter-spacing: .4px;\n    padding: 8px 10px; border-radius: 7px; cursor: pointer; text-align: left;\n    display: flex; align-items: center; gap: 7px; transition: .12s; white-space: nowrap;\n  }\n  .btn:hover { border-color: var(--accent, #33425a); background: #16202d; transform: translateY(-1px); }\n  .btn:active { transform: translateY(0); }\n  .btn .g { font-family: var(--f-num); font-size: 12px; opacity: .85; }\n  .btn.primary { background: color-mix(in srgb, var(--accent) 18%, #121a25); border-color: color-mix(in srgb, var(--accent) 55%, transparent); color: var(--accent); }\n  .btn.primary:hover { background: color-mix(in srgb, var(--accent) 26%, #121a25); }\n  .btn.danger { color: var(--st-fault); border-color: color-mix(in srgb, var(--st-fault) 45%, transparent); }\n  .btn.ghost { color: var(--ink-dim); }\n  .btn[disabled] { opacity: .34; cursor: not-allowed; transform: none; }\n\n  .gbar { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 4px; }\n  .gbtn {\n    appearance: none; border: 1px solid var(--rule); border-radius: 8px; cursor: pointer;\n    font-family: var(--f-ui); font-weight: 700; font-size: 13px; letter-spacing: .8px;\n    padding: 10px; color: var(--ink); background: #121a25; transition: .12s;\n  }\n  .gbtn.run { color: var(--st-lock); border-color: color-mix(in srgb, var(--st-lock) 45%, transparent); background: color-mix(in srgb, var(--st-lock) 14%, #121a25); }\n  .gbtn.stop { color: var(--ink-dim); }\n  .gbtn:hover { transform: translateY(-1px); }\n\n  /* serial log */\n  .log {\n    margin-top: 12px; border-top: 1px solid var(--rule-soft); padding-top: 10px;\n  }\n  .log .lh { font-size: 9.5px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }\n  .log .lh .blink { width: 6px; height: 6px; border-radius: 50%; background: var(--ch1); animation: lblink 1.1s steps(2) infinite; }\n  @keyframes lblink { 50% { opacity: .2; } }\n  #serial {\n    font-family: var(--f-num); font-size: 10.5px; line-height: 1.55; color: var(--ink-dim);\n    height: 120px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;\n  }\n  #serial div { white-space: nowrap; }\n  #serial .t { color: var(--ink-mute); }\n  #serial .c1 { color: var(--ch1); } #serial .c2 { color: var(--ch2); }\n  #serial .ok { color: var(--st-lock); } #serial .er { color: var(--st-fault); }\n\n  .hint { margin-top: 14px; font-size: 12px; color: var(--ink-mute); max-width: 640px; line-height: 1.5; }\n  .hint b { color: var(--ink-dim); font-weight: 600; }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"font-size: 8px\">\n  <div>\n    <div class=\"lead\">\n      <p class=\"kick\">Teensy 4.1 · 2.8\" ILI9341 · 320×240<\u002Fp>\n      <h1>Dual-Laser PDH Lock Controller<\u002Fh1>\n      <p>The display is headless and read-only — the operator drives the instrument over serial. Use the console to run a sweep-to-lock on each channel: a <b>coarse<\u002Fb> TEC/temperature scan finds the cavity mode, a <b>fine<\u002Fb> laser-current scan walks onto the peak, then the PDH servo engages and holds the lock.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"wrap\">\n      <div>\n        <div class=\"device\">\n          <span class=\"hole tl\"><\u002Fspan><span class=\"hole tr\"><\u002Fspan>\n          <span class=\"hole bl\"><\u002Fspan><span class=\"hole br\"><\u002Fspan>\n          <div class=\"bezel\">\n            <div class=\"screen-wrap\"><div id=\"screen\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"device-foot\">\n            <span class=\"pwr\"><\u002Fspan><span>PWR<\u002Fspan>\n            <span class=\"sp\"><\u002Fspan>\n            <span>ILI9341 · SPI0<\u002Fspan>\n            <span>·<\u002Fspan>\n            <span id=\"fps\">10 Hz<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"hint\">This is a true-pixel <b>320×240<\u002Fb> render shown at 2×. The traces are simulated: cavity transmission (channel colour, filled) during sweeps, the dispersive PDH error signal at lock-in, and the in-lock error time-series once the servo holds.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"console\">\n        <h2>Host Console<\u002Fh2>\n        <div class=\"sub\">serial @ 115200 · non-blocking control loop 1 kHz<\u002Fdiv>\n\n        <div class=\"gbar\">\n          <button class=\"gbtn run\" id=\"runBoth\">▶ RUN BOTH<\u002Fbutton>\n          <button class=\"gbtn stop\" id=\"stopAll\">■ STOP ALL<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div class=\"cgroup\" id=\"grp1\">\n          <div class=\"cglabel\"><span class=\"cdot\" style=\"background:var(--ch1)\"><\u002Fspan>CH1 · 1550 nm DFB<span class=\"stat\" id=\"st1\" style=\"color:var(--ch1)\">IDLE<\u002Fspan><\u002Fdiv>\n          <div class=\"brow\">\n            <button class=\"btn primary\" data-act=\"sweep\" data-ch=\"0\" style=\"--accent:var(--ch1)\"><span class=\"g\">↻<\u002Fspan>Sweep + Lock<\u002Fbutton>\n            <button class=\"btn\" data-act=\"manual\" data-ch=\"0\"><span class=\"g\">⊹<\u002Fspan>Manual<\u002Fbutton>\n            <button class=\"btn danger\" data-act=\"break\" data-ch=\"0\"><span class=\"g\">⚡<\u002Fspan>Break Lock<\u002Fbutton>\n            <button class=\"btn ghost\" data-act=\"stop\" data-ch=\"0\"><span class=\"g\">■<\u002Fspan>Stop<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"cgroup\" id=\"grp2\">\n          <div class=\"cglabel\"><span class=\"cdot\" style=\"background:var(--ch2)\"><\u002Fspan>CH2 · 1560 nm DFB<span class=\"stat\" id=\"st2\" style=\"color:var(--ch2)\">IDLE<\u002Fspan><\u002Fdiv>\n          <div class=\"brow\">\n            <button class=\"btn primary\" data-act=\"sweep\" data-ch=\"1\" style=\"--accent:var(--ch2)\"><span class=\"g\">↻<\u002Fspan>Sweep + Lock<\u002Fbutton>\n            <button class=\"btn\" data-act=\"manual\" data-ch=\"1\"><span class=\"g\">⊹<\u002Fspan>Manual<\u002Fbutton>\n            <button class=\"btn danger\" data-act=\"break\" data-ch=\"1\"><span class=\"g\">⚡<\u002Fspan>Break Lock<\u002Fbutton>\n            <button class=\"btn ghost\" data-act=\"stop\" data-ch=\"1\"><span class=\"g\">■<\u002Fspan>Stop<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"cgroup\">\n          <div class=\"brow one\">\n            <button class=\"btn\" id=\"setBtn\"><span class=\"g\">⚙<\u002Fspan>Settings · Calibration view<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"log\">\n          <div class=\"lh\"><span class=\"blink\"><\u002Fspan>Serial monitor<\u002Fdiv>\n          <div id=\"serial\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script src=\"16e05409-7fbe-4c87-8b2d-38359d15b131\"><\u002Fscript>\n  <script src=\"e0289c4d-25b2-4127-9113-4b091e3144a4\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
